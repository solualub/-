<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Solo Central</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Quicksand',sans-serif;font-weight:700}
    html,body{height:100%;overflow:hidden;background:#000}
    .wrapper{
      display:flex;flex-direction:column;height:100%;
      padding:20px 20px 0;
    }
    .iframe-container{
      flex:1;border-radius:14px;overflow:hidden;
      box-shadow:0 8px 40px rgba(0,0,0,0.6);
      background:#fff;
    }
    .gameframe{
      width:100%;height:100%;display:block;border:none;
      background:#fff;
    }
    .bottom-bar{
      display:flex;align-items:center;justify-content:center;
      padding:12px 0 16px;gap:10px;
    }
    .bar-btn{
      display:flex;align-items:center;justify-content:center;
      width:46px;height:46px;border-radius:10px;
      background:#0a0a0a;border:1px solid #1a1a1a;
      color:#555;cursor:pointer;transition:all 0.2s ease;
      text-decoration:none;
    }
    .bar-btn:hover{background:#1a1a1a;color:#fff;border-color:#333}
    .bar-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="iframe-container" id="iframe-container">
      <iframe class="gameframe" id="gameframe" allowfullscreen></iframe>
    </div>
    <div class="bottom-bar">
      <button class="bar-btn" id="btn-fullscreen" title="Fullscreen">
        <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
      </button>
      <button class="bar-btn" id="btn-reload" title="Reload">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      </button>
      <a class="bar-btn" id="btn-newtab" title="Open in New Tab" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const src = params.get('src') || '';
    const frame = document.getElementById('gameframe');

    if (src) {
      frame.src = src;
      document.getElementById('btn-newtab').href = src;
    }

    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      const el = document.getElementById('iframe-container');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    });

    document.getElementById('btn-reload').addEventListener('click', () => {
      frame.src = frame.src;
    });
  </script>
</body>
</html>
