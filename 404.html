<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Solo Central — Not Found</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
    .err-wrap{display:flex;flex-direction:column;align-items:center;gap:15px}
    .err-code{font-size:5.5rem;font-weight:700;color:#e0e0e0;opacity:0.3}
    .err-msg{font-size:1rem;color:#666}
    .err-link{
      color:#e0e0e0;text-decoration:none;font-size:0.9rem;
      background:#0a0a0a;border:2px solid #1a1a1a;
      padding:10px 20px;border-radius:5px;
      transition:all 0.3s ease;
    }
    .err-link:hover{transform:scale(1.05);border-color:#333;color:#fff}
  </style>
</head>
<body>
  <div class="err-wrap">
    <div class="err-code">404</div>
    <div class="err-msg">The page you're looking for doesn't exist.</div>
    <a class="err-link" href="/">Back to Solo Central</a>
  </div>
</body>
</html>
